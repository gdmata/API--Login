<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SushiMania - Cadastro</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="wrapper">
    <h1>Login</h1>
    <p id="errorMessage"></p>
    <form id="loginForm">
      <!-- Grupo 3: Email -->
      <div>
        <label for="email-input">@</label>
        <input type="email" name="email" id="email-input" placeholder="Email" />
      </div>

      <!-- Grupo 4: Senha -->
      <div>
        <label for="password-input">
          <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
            <path
              d="M240-80q-33 0-56.5-23.5T160-160v-400q0-33 23.5-56.5T240-640h40v-80q0-83 58.5-141.5T480-920q83 0 141.5 58.5T680-720v80h40q33 0 56.5 23.5T800-560v400q0 33-23.5 56.5T720-80H240Zm0-80h480v-400H240v400Zm296.5-143.5Q560-327 560-360t-23.5-56.5Q513-440 480-440t-56.5 23.5Q400-393 400-360t23.5 56.5Q447-280 480-280t56.5-23.5ZM360-640h240v-80q0-50-35-85t-85-35q-50 0-85 35t-35 85v80ZM240-160v-400 400Z" />
          </svg>
        </label>
        <input type="password" name="password" id="password-input" placeholder="Senha" />
      </div>
      <div>
        <button type="submit">Login</button>
      </div>
    </form>
    <p>Ainda não possui uma conta? <a href="index.html">Criar Conta</a></p>
  </div>
  <script defer>
    const frm = document.querySelector("form");
    const emailInput = document.querySelector("#email-input");
    const passwordInput = document.querySelector("#password-input");
    const msgForm = document.querySelector("#errorMessage");

    frm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = emailInput.value;
      const password = passwordInput.value;
      const loginData = {
        email: email,
        password: password,
      };

      try {
        const response = await fetch("http://localhost:3000/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(loginData),
        });
        const data = await response.json();

        if (response.ok) {
          localStorage.setItem("token", data.token);
          msgForm.innerText = data.mensagem + "\n" + data.usuario;
          window.location.href = "http://localhost:3000/order.html";
        }
        if (!response.ok) {
          throw new Error(`HTTP error! Status: ${response.status}`);
          msgForm.innerText = data.erro || "Erro ao realizar Login"
        }
      } catch (e) {
        console.error("Fetch error", e, response.status);
      }
    });
  </script>
</body>

</html>
