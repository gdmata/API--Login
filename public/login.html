<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sushi Mania - Login</title>
    <!-- Conectando o mesmo arquivo de estilos 🔗 -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>SUSHI MANIA CULINÁRIA ORIENTAL</h1>
    <div>
      <!-- Formulário de Login focado apenas em Email e Senha -->
      <form id="loginForm">
        <p>
          Email
          <input
            type="email"
            id="loginMail"
            placeholder="Insira seu e-mail"
            required
            class="loginField"
          />
        </p>
        <p>
          Senha
          <input
            type="password"
            id="loginPass"
            placeholder="Digite sua senha"
            required
            class="loginField"
          />
        </p>

        <input type="submit" value="Entrar" class="loginBtn" />

        <!-- Link para voltar para a página de cadastro se o usuário não tiver conta -->
        <p class="link-navegacao">
          <a href="index.html">Não tem uma conta? Cadastre-se aqui!</a>
        </p>
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
