<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>SUSHI MANIA CULINARIA ORIENTAL</h1>
    <div>
      <form id="regForm">
        <p>
          Nome Completo
          <input type="text" id="registerName" required />
        </p>
        <p>
          E-mail
          <input type="email" id="regMail" required />
        </p>
        <p>
          Senha
          <input type="password" id="regPass" required />
        </p>
        <p>
            Telefone
            <input type="number" required id="regPhone">
            <h6 style="font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Será necessário verificar</h6>
        </p>

        <p>Endereço
            <input type="text" id="regAddress" required>
        </p>
<input type="submit" value="Cadastrar!">
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
